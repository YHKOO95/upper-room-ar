<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>완료 | 비상수련회 AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
</head>
<body>

<div id="app">
  <div id="s-complete" class="screen active">
    <div class="stardust" id="dust-complete"></div>
    <div class="wg wg-lg" style="top:36%;"></div>
    <div class="complete-top"><span class="pill" id="complete-pill">COMPLETE</span></div>
    <div class="complete-ht"><div class="ht-xl">THE LIGHT<br>HAS COME</div></div>
    <div class="complete-glyphs" id="complete-glyphs"></div>
    <p class="complete-desc">네 자리에서 이어진 빛이 다락방에 모였습니다.<br>오늘 밤, 같은 자리에서 무릎을 꿇어보아요.</p>
    <div class="screen-bottom">
      <button type="button" class="btn-primary glow" id="btn-make-card">기념 카드 만들기 →</button>
      <div class="btn-ghost-row"><button type="button" class="btn-ghost" id="btn-complete-reset">처음으로</button></div>
    </div>
  </div>
</div>

<script type="module" src="/src/entry-complete.js"></script>
</body>
</html>
