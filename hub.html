<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>네 개의 표식 | 비상수련회 AR</title>
  <style>
    #dev-insecure-context { position: fixed; inset: 0; z-index: 99999; padding: max(16px, env(safe-area-inset-top)) 20px 24px; background: #1a0a0a; color: #fff; font-size: 15px; line-height: 1.55; border: 3px solid #f5c26b; overflow: auto; font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif; }
    #dev-insecure-context[hidden] { display: none !important; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <script>
    (function () {
      if (window.isSecureContext) return;
      document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('dev-insecure-context');
        if (el) el.hidden = false;
      });
    })();
  </script>
</head>
<body>

<div id="dev-insecure-context" hidden><strong>HTTPS로 접속해 주세요</strong></div>

<div id="app">
  <div id="s-hub" class="screen active">
    <div class="stardust" id="dust-hub"></div>
    <div class="hub-scroll">
      <div class="hub-header-row">
        <span class="pill">UPPER ROOM · AR</span>
        <span class="mono-sm" id="hub-count">00 / 04</span>
      </div>
      <h1 class="hub-title">네 개의 표식</h1>
      <p class="hub-desc">사랑홀 로비 곳곳에 숨겨진 표식을 찾아 카메라로 비춰보세요.</p>
      <div class="hub-progress-bar"><div class="hub-progress-fill" id="hub-fill"></div></div>
      <div class="hub-list" id="hub-list"></div>
    </div>
    <div class="hub-cta">
      <button type="button" class="btn-primary glow" id="btn-hub-scan">카메라로 찾기</button>
    </div>
  </div>
</div>

<script type="module" src="/src/entry-hub.js"></script>
</body>
</html>
