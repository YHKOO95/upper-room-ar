<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>다짐 | 비상수련회 AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
</head>
<body>

<div id="app">
  <div id="s-reflect" class="screen active">
    <div class="stardust dim" id="dust-reflect"></div>
    <div class="wg wg-md" style="top:22%;"></div>
    <div class="card-progress" id="cp-reflect"></div>
    <div class="card-bar">
      <a class="card-back" href="complete.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        뒤로
      </a>
      <span class="card-step-lbl">01 · REFLECT</span>
    </div>
    <div class="card-headline">
      <div class="ht-md">오늘 밤,<br>무엇을 남기시겠어요?</div>
      <p class="card-headline-sub">한 줄로 적은 다짐이 카드에 새겨집니다.</p>
    </div>
    <div class="reflect-box">
      <textarea id="reflect-text" rows="2" maxlength="40"></textarea>
      <div class="reflect-ph" id="reflect-ph">예: 매일 아침, 창문을 연다</div>
      <div class="reflect-footer">
        <span class="mono-sm">RESOLUTION · 다짐</span>
        <span class="reflect-cnt" id="reflect-cnt">0/40</span>
      </div>
    </div>
    <div class="screen-bottom">
      <button type="button" class="btn-primary" id="btn-reflect-next">다음 →</button>
      <div class="btn-ghost-row"><button type="button" class="btn-ghost" id="btn-reflect-skip">건너뛰기</button></div>
    </div>
  </div>
</div>

<script type="module" src="/src/entry-reflect.js"></script>
</body>
</html>
