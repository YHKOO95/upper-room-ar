<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020208" />
  <title>2026 여호수아 비상수련회 AR</title>
  <style>
    #dev-insecure-context {
      position: fixed;
      inset: 0;
      z-index: 99999;
      padding: max(16px, env(safe-area-inset-top)) 20px 24px;
      background: #1a0a0a;
      color: #fff;
      font-size: 15px;
      line-height: 1.55;
      border: 3px solid #f5c26b;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    }
    #dev-insecure-context[hidden] { display: none !important; }
    #dev-insecure-context strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #ffe8b8;
    }
    #dev-insecure-context p { margin-bottom: 12px; color: rgba(255,255,255,0.88); }
    #dev-insecure-context .dev-insecure-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 0; }
    #dev-insecure-context .dev-insecure-code {
      font-family: ui-monospace, monospace;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <script>
    (function () {
      if (window.isSecureContext) return;
      window.__upperRoomNeedsHttps = true;
      document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('dev-insecure-context');
        if (el) el.hidden = false;
      });
    })();
  </script>
</head>
<body class="upper-room-root">
<div id="dev-insecure-context" class="dev-insecure-context" hidden>
  <strong>HTTPS로 접속해 주세요</strong>
  <p>지금은 HTTP(비보안)라서 카메라·8th Wall 엔진이 시작되지 않습니다. 주소를 <code class="dev-insecure-code">https://</code>로 바꾼 뒤 다시 열어주세요.</p>
  <p class="dev-insecure-sub">자체 서명 인증서 경고가 나오면 «고급» 또는 «세부 정보»에서 계속 진행하면 됩니다.</p>
</div>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
