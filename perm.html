<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>카메라 안내 | 비상수련회 AR</title>
  <style>
    #dev-insecure-context {
      position: fixed;
      inset: 0;
      z-index: 99999;
      padding: max(16px, env(safe-area-inset-top)) 20px 24px;
      background: #1a0a0a;
      color: #fff;
      font-size: 15px;
      line-height: 1.55;
      border: 3px solid #f5c26b;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    }
    #dev-insecure-context[hidden] { display: none !important; }
    #dev-insecure-context strong { display: block; font-size: 1.1rem; margin-bottom: 12px; color: #ffe8b8; }
    #dev-insecure-context p { margin-bottom: 12px; color: rgba(255,255,255,0.88); }
    #dev-insecure-context .dev-insecure-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 0; }
    #dev-insecure-context .dev-insecure-code {
      font-family: ui-monospace, monospace;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <script>
    (function () {
      if (window.isSecureContext) return;
      document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('dev-insecure-context');
        if (el) el.hidden = false;
      });
    })();
  </script>
</head>
<body>

<div id="dev-insecure-context" class="dev-insecure-context" hidden>
  <strong>HTTPS로 접속해 주세요</strong>
  <p>지금은 HTTP(비보안)입니다. 주소를 <code class="dev-insecure-code">https://</code>로 바꿔 주세요.</p>
</div>

<div id="app">
  <div id="s-perm" class="screen active">
    <div class="stardust" id="dust-perm"></div>
    <div class="perm-step"><span class="pill dim">STEP 01 / 02</span></div>
    <div class="perm-center">
      <div class="perm-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="18" height="13" rx="2" stroke="#F5C26B" stroke-width="1.4"/>
          <circle cx="12" cy="12.5" r="3.5" stroke="#F5C26B" stroke-width="1.4"/>
          <rect x="8" y="3" width="8" height="3" rx="1" stroke="#F5C26B" stroke-width="1.4"/>
        </svg>
      </div>
      <h2 class="perm-title">카메라 안내</h2>
      <p class="perm-desc">표식을 찾는 <strong>스캔 화면</strong>에서만 카메라가 켜집니다.<br>
        브라우저에서 카메라 허용을 물으면 허용해 주세요.<br>
        <span class="perm-note">사진은 저장되거나 전송되지 않습니다.</span>
      </p>
    </div>
    <div class="screen-bottom">
      <button type="button" class="btn-primary glow" id="btn-perm-go">다음 →</button>
      <div class="btn-ghost-row"><button type="button" class="btn-ghost" id="btn-perm-skip">나중에</button></div>
    </div>
  </div>
</div>

<script type="module" src="/src/entry-perm.js"></script>
</body>
</html>
