<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>봉인 | 비상수련회 AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="app">
  <div id="s-seal" class="screen active">
    <div class="stardust" id="dust-seal"></div>
    <div class="wg wg-lg" id="wg-seal" style="top:32%;opacity:0.5;transition:opacity 200ms;"></div>
    <div class="card-progress" id="cp-seal"></div>
    <div class="card-bar">
      <button type="button" class="card-back" id="btn-seal-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        뒤로
      </button>
      <span class="card-step-lbl" id="seal-lbl">03 · SEAL</span>
    </div>
    <div class="seal-card-wrap" id="seal-card-wrap"></div>
    <div class="seal-hint" id="seal-hint">아래 원을 <strong>꾹 눌러</strong> 빛을 봉인해주세요.</div>
    <div class="seal-btn-area" id="seal-btn-area">
      <div class="seal-btn" id="seal-btn">
        <svg class="seal-svg" width="116" height="116" viewBox="0 0 116 116">
          <circle cx="58" cy="58" r="44" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
          <circle id="seal-ring" cx="58" cy="58" r="44" stroke="#F5C26B" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-dasharray="276.46" stroke-dashoffset="276.46"/>
        </svg>
        <div class="seal-inner" id="seal-inner">HOLD</div>
      </div>
    </div>
    <div class="seal-done" id="seal-done" style="display:none">
      <p class="seal-done-title">봉인이 완료되었습니다</p>
      <p class="seal-done-sub">당신의 카드는 이미 다락방에 한 장 걸렸어요.</p>
      <button type="button" class="btn-secondary" id="btn-seal-share" style="display:none">공유하기</button>
      <div class="btn-ghost-row"><button type="button" class="btn-ghost" id="btn-seal-reset">처음으로</button></div>
    </div>
    <div class="seal-toast" id="seal-toast">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1a0e00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      사진 앱에 저장되었어요
    </div>
  </div>
</div>

<script type="module" src="/src/entry-seal.js"></script>
</body>
</html>
